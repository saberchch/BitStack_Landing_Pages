<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Bitstack - Create Account</title>
    <link class="w-full h-full" rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='img/favicon.svg') }}">
    
    <!-- Tailwind CSS v3 CDN -->
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bts-gold': '#d4a017',
                        'bts-gold-hover': '#b88a14',
                        'bts-navy': '#0a192f',
                        'bts-light-gray': '#f8fafc',
                    }
                }
            }
        }
    </script>
    
    <!-- Google Fonts (Inter) -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        input:focus {
            outline: none !important;
            box-shadow: 0 0 0 2px rgba(212, 160, 23, 0.2) !important;
        }
    </style>
</head>
<body class="bg-white min-h-screen h-full flex flex-col items-center justify-center p-4 antialiased overflow-y-auto">
    
    <!-- Subtle background glow -->
    <div class="absolute top-0 right-0 w-80 h-80 bg-bts-gold/5 rounded-full filter blur-[100px] pointer-events-none"></div>
    <div class="absolute bottom-0 left-0 w-80 h-80 bg-indigo-50/50 rounded-full filter blur-[100px] pointer-events-none"></div>

    <!-- Main Card - Compact and height-optimized -->
    <div class="w-full max-w-[420px] bg-white border border-slate-100 shadow-xl rounded-2xl p-6 md:p-8 relative z-10 flex flex-col justify-center my-auto">
        
        <!-- Logo Header -->
        <div class="flex flex-col items-center mb-5">
            <a href="/" class="mb-3 transform hover:scale-105 transition-transform duration-300">
                <img src="{{ url_for('static', filename='img/logo.svg') }}" alt="Bitstacks" class="h-14">
            </a>
            <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight text-center">Create Account</h1>
            <p class="text-slate-500 text-xs mt-1 text-center">Choose your role and set up your credentials</p>
        </div>

        <form action="#" class="space-y-4" method="POST">
            <!-- Role Selector -->
            <div class="space-y-2">
                <label class="text-[10px] font-bold uppercase tracking-wider text-slate-500 block">
                    Select Pathway
                </label>
                <div class="grid grid-cols-3 gap-2">
                    
                    <!-- Student -->
                    <label class="cursor-pointer group">
                        <input checked="" class="peer sr-only" name="role" type="radio" value="student"/>
                        <div class="h-20 flex flex-col items-center justify-center gap-1 border border-slate-200 bg-slate-50 rounded-xl peer-checked:border-bts-gold peer-checked:bg-bts-gold/5 peer-checked:text-bts-gold text-slate-500 hover:border-slate-300 hover:bg-slate-100/50 transition-all duration-200">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M12 14l9-5-9-5-9 5 9 5zm0 0l6.16-3.422a12.083 12.083 0 01.665 6.479A11.952 11.952 0 0012 20.055a11.952 11.952 0 00-6.824-2.998 12.078 12.078 0 01.665-6.479L12 14zm-4 6v-7.5l4-2.222" />
                            </svg>
                            <span class="text-[10px] font-bold uppercase tracking-wider">Student</span>
                        </div>
                    </label>

                    <!-- Mentor -->
                    <label class="cursor-pointer group">
                        <input class="peer sr-only" name="role" type="radio" value="mentor"/>
                        <div class="h-20 flex flex-col items-center justify-center gap-1 border border-slate-200 bg-slate-50 rounded-xl peer-checked:border-bts-gold peer-checked:bg-bts-gold/5 peer-checked:text-bts-gold text-slate-500 hover:border-slate-300 hover:bg-slate-100/50 transition-all duration-200">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z" />
                            </svg>
                            <span class="text-[10px] font-bold uppercase tracking-wider">Mentor</span>
                        </div>
                    </label>

                    <!-- Freelancer -->
                    <label class="cursor-pointer group">
                        <input class="peer sr-only" name="role" type="radio" value="freelancer"/>
                        <div class="h-20 flex flex-col items-center justify-center gap-1 border border-slate-200 bg-slate-50 rounded-xl peer-checked:border-bts-gold peer-checked:bg-bts-gold/5 peer-checked:text-bts-gold text-slate-500 hover:border-slate-300 hover:bg-slate-100/50 transition-all duration-200">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M21 13.255A23.931 23.931 0 0112 15c-3.183 0-6.22-.62-9-1.745M16 6V4a2 2 0 00-2-2h-4a2 2 0 00-2 2v2m4 6h.01M5 20h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                            </svg>
                            <span class="text-[10px] font-bold uppercase tracking-wider">Freelance</span>
                        </div>
                    </label>

                </div>
            </div>

            <!-- Email Address Input -->
            <div class="space-y-1">
                <label class="text-[10px] font-bold uppercase tracking-wider text-slate-500 block" for="email">
                    Email Address
                </label>
                <input 
                    class="w-full h-11 bg-slate-50 border border-slate-200 text-slate-800 placeholder-slate-400 rounded-xl px-4 text-sm focus:bg-white focus:border-bts-gold transition-all duration-200" 
                    id="email" 
                    name="email" 
                    placeholder="name@example.com" 
                    required="" 
                    type="email"
                />
            </div>

            <!-- Password Input -->
            <div class="space-y-1">
                <label class="text-[10px] font-bold uppercase tracking-wider text-slate-500 block" for="password">
                    Password
                </label>
                <input 
                    class="w-full h-11 bg-slate-50 border border-slate-200 text-slate-800 placeholder-slate-400 rounded-xl px-4 text-sm focus:bg-white focus:border-bts-gold transition-all duration-200" 
                    id="password" 
                    name="password" 
                    placeholder="••••••••" 
                    required="" 
                    type="password"
                />
            </div>

            <!-- Submit Button -->
            <div class="pt-2">
                <button 
                    class="w-full h-12 bg-bts-gold hover:bg-bts-gold-hover text-white font-bold rounded-xl shadow-md shadow-bts-gold/10 hover:shadow-lg transition-all duration-300 flex items-center justify-center text-base tracking-wide" 
                    type="submit"
                >
                    Create Account
                </button>
            </div>
        </form>

        <!-- Redirect Link -->
        <div class="mt-6 text-center border-t border-slate-100 pt-4">
            <p class="text-xs text-slate-500">
                Already active? 
                <a class="text-bts-gold font-bold hover:underline ml-1" href="/signin">
                    Authenticate here
                </a>
            </p>
        </div>

    </div>
</body>
</html>
